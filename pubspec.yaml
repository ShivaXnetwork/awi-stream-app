name: awi_stream_app
description: Crunchyroll clone for AWI.TO
publish_to: "none"
version: 1.0.0+1
environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.1.0
  cached_network_image: ^3.3.0
  webview_flutter: ^4.4.2
  firebase_core: ^2.24.2
  cloud_firestore: ^4.14.0
  video_player: ^2.8.2
  chewie: ^1.7.5
  perfect_volume_control: any
  screen_brightness: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
