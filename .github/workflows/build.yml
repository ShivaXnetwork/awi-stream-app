name: Build AWI Premium APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Install dependencies
      run: flutter pub get

    - name: Generate Missing Android Folder
      run: flutter create .

    - name: Upgrade Android SDK to 21
      run: |
        sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' android/app/build.gradle
        sed -i 's/minSdkVersion 16/minSdkVersion 21/g' android/app/build.gradle
        sed -i 's/minSdkVersion 19/minSdkVersion 21/g' android/app/build.gradle

    - name: Build Premium APK
      run: flutter build apk --release

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: AWI-Premium-App
        path: build/app/outputs/flutter-apk/app-release.apk
        
